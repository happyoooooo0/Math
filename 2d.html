<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>矩阵×向量 向量图计算器</title>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; max-width: 900px; margin: 20px auto; padding: 20px; }
        .input-box { margin-bottom: 20px; }
        input { width: 60px; padding: 8px; margin: 5px; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { 
            background: #28a745; color: white; border: none; 
            padding: 10px 25px; border-radius: 6px; cursor: pointer; font-size: 16px;
        }
        button:hover { background: #218838; }
        #result { 
            margin: 20px 0; padding: 15px; 
            background: #f8f9fa; border-radius: 8px; 
            font-size: 16px; white-space: pre-line; line-height: 1.6;
        }
        #vectorCanvas { 
            width: 100%; 
            height: 500px; 
            border: 1px solid #eee; 
            background: #ffffff;
        }
    </style>
</head>
<body>
    <h1>📊 2×2矩阵 × 向量 变换演示</h1>
    <p>输入矩阵和向量，点击计算，查看向量变换过程：</p>

    <div class="input-box">
        <h4>🔢 输入2×2矩阵</h4>
        <input type="number" id="m00" value="1" step="any">
        <input type="number" id="m01" value="2" step="any"><br>
        <input type="number" id="m10" value="3" step="any">
        <input type="number" id="m11" value="4" step="any">
    </div>

    <div class="input-box">
        <h4>📌 输入二维向量 (x, y)</h4>
        <input type="number" id="vx" value="1" step="any">
        <input type="number" id="vy" value="1" step="any">
    </div>

    <button onclick="calculateAndDraw()">计算并绘制向量图</button>

    <div id="result">请点击计算按钮...</div>
    <canvas id="vectorCanvas"></canvas>

    <script>
        function calculateAndDraw() {
            // 1. 读取输入值
            const a = parseFloat(document.getElementById("m00").value) || 0;
            const b = parseFloat(document.getElementById("m01").value) || 0;
            const c = parseFloat(document.getElementById("m10").value) || 0;
            const d = parseFloat(document.getElementById("m11").value) || 0;
            const x = parseFloat(document.getElementById("vx").value) || 0;
            const y = parseFloat(document.getElementById("vy").value) || 0;

            // 2. 计算结果向量
            const rx = a * x + b * y;
            const ry = c * x + d * y;

            // 3. 显示计算结果（同步更新颜色说明）
            document.getElementById("result").innerText = 
`📝 计算结果:
输入向量: (${x}, ${y})
矩阵: 
[ ${a}, ${b} ]
       [ ${c}, ${d} ]

结果向量: (${rx.toFixed(2)}, ${ry.toFixed(2)})

🔵 蓝色箭头: 初始向量
🔴 红色箭头: 变换后的结果向量
`;

            // 4. 绘制向量图
            const canvas = document.getElementById('vectorCanvas');
            const ctx = canvas.getContext('2d');
            
            // 固定画布尺寸
            const W = 800;
            const H = 500;
            canvas.width = W;
            canvas.height = H;
            
            // 原点在画布中心
            const originX = W / 2;
            const originY = H / 2;
            const gridSize = 40; // 网格大小

            // --- 绘制网格 ---
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            // 水平网格线
            for (let y = 0; y <= H; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
            }
            // 垂直网格线
            for (let x = 0; x <= W; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
                ctx.stroke();
            }

            // --- 绘制坐标轴（带箭头）---
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            // X轴（从左到右，右端加箭头）
            ctx.beginPath();
            ctx.moveTo(0, originY);
            ctx.lineTo(W - 20, originY);
            ctx.stroke();
            // X轴箭头
            ctx.beginPath();
            ctx.moveTo(W - 20, originY);
            ctx.lineTo(W - 30, originY - 5);
            ctx.lineTo(W - 30, originY + 5);
            ctx.closePath();
            ctx.fill();

            // Y轴（从下到上，上端加箭头）
            ctx.beginPath();
            ctx.moveTo(originX, H);
            ctx.lineTo(originX, 20);
            ctx.stroke();
            // Y轴箭头
            ctx.beginPath();
            ctx.moveTo(originX, 20);
            ctx.lineTo(originX - 5, 30);
            ctx.lineTo(originX + 5, 30);
            ctx.closePath();
            ctx.fill();

            // 坐标轴标签
            ctx.fillStyle = '#333';
            ctx.font = '20px Arial';
            ctx.fillText('x轴', W - 40, originY + 30);
            ctx.fillText('y轴', originX + 15, 30);

            // --- 计算缩放比例（缩短橙色向量长度）---
            const maxCoord = Math.max(Math.abs(rx), Math.abs(ry), Math.abs(x), Math.abs(y));
            // 核心调整：缩小红色向量的缩放比例，让长度更短
            const scale_blue = (W / 2 - 60) / (maxCoord || 1);
            const scale_red = scale_blue * 0.6; // 红色长度为蓝色的60%

            // --- 绘制双向箭头的工具函数（支持自定义颜色和粗细）---
            function drawDoubleArrow(endX, endY, color, scale, lineWidth) {
                // 起点：原点(0,0)
                const x1 = originX;
                const y1 = originY;
                // 终点：向量端点
                const x2 = originX + endX * scale;
                const y2 = originY - endY * scale;
                // 反向终点：原点另一侧
                const x3 = originX - endX * scale;
                const y3 = originY + endY * scale;

                // 1. 绘制主线段（从反向端点到正向端点，穿过原点）
                ctx.strokeStyle = color;
                ctx.lineWidth = lineWidth;
                ctx.beginPath();
                ctx.moveTo(x3, y3);
                ctx.lineTo(x2, y2);
                ctx.stroke();

                // 2. 绘制正向箭头（指向向量端点）
                const headLen = 12;
                const angle1 = Math.atan2(y2 - y1, x2 - x1);
                ctx.beginPath();
                ctx.moveTo(x2, y2);
                ctx.lineTo(
                    x2 - headLen * Math.cos(angle1 - Math.PI/6),
                    y2 - headLen * Math.sin(angle1 - Math.PI/6)
                );
                ctx.lineTo(
                    x2 - headLen * Math.cos(angle1 + Math.PI/6),
                    y2 - headLen * Math.sin(angle1 + Math.PI/6)
                );
                ctx.closePath();
                ctx.fillStyle = color;
                ctx.fill();

                // 3. 绘制反向箭头（指向原点另一侧）
                const angle2 = Math.atan2(y3 - y1, x3 - x1);
                ctx.beginPath();
                ctx.moveTo(x3, y3);
                ctx.lineTo(
                    x3 - headLen * Math.cos(angle2 - Math.PI/6),
                    y3 - headLen * Math.sin(angle2 - Math.PI/6)
                );
                ctx.lineTo(
                    x3 - headLen * Math.cos(angle2 + Math.PI/6),
                    y3 - headLen * Math.sin(angle2 + Math.PI/6)
                );
                ctx.closePath();
                ctx.fill();
            }

            // 🔵 绘制初始向量（蓝色，细线条，完整长度）
            drawDoubleArrow(x, y, '#1f77b4', scale_blue, 8);
            // 🔴 绘制结果向量（红色，粗线条，缩短长度）
            drawDoubleArrow(rx, ry, '#d62728', scale_red, 3);
        }
    </script>
</body>
</html>
